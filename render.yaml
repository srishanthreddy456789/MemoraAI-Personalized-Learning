# render.yaml - Render deployment configuration
# Place this at the ROOT of your repository.

services:
  - type: web
    name: memoraai-backend
    runtime: python
    # rootDir intentionally NOT set - run from repo root so relative imports work
    buildCommand: pip install -r backend/requirements.txt
    # Run as "backend.main" (package) so relative imports (from .api.x) resolve correctly
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://memora-ai-personalized-learning.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
