# render.yaml - Render deployment configuration
# Place this at the ROOT of your repository.
# Reference: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: memoraai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        value: https://memora-ai-personalized-learning.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
